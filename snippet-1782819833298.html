<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUMO — Venda Mais e Economize Tempo com IA</title>
<style>
  /* ══════════ RESET & VARIÁVEIS ══════════ */
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --green-primary: #22C55E;
    --green-dark: #16A34A;
    --green-light: #BBF7D0;
    --green-bg: #F0FDF4;
    --navy: #1B2A4A;
    --navy-light: #2D4A7A;
    --white: #FFFFFF;
    --gray-50: #F9FAFB;
    --gray-100: #F3F4F6;
    --gray-200: #E5E7EB;
    --gray-300: #D1D5DB;
    --gray-500: #6B7280;
    --gray-700: #374151;
    --gray-900: #111827;
    --shadow-sm: 0 1px 3px rgba(0,0,0,.08);
    --shadow-md: 0 4px 14px rgba(0,0,0,.1);
    --shadow-lg: 0 10px 30px rgba(0,0,0,.12);
    --radius: 12px;
    --radius-lg: 20px;
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font);
    color: var(--gray-900);
    background: var(--white);
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* ══════════ UTILIDADES ══════════ */
  .container { max-width: 1140px; margin: 0 auto; padding: 0 24px; }
  .hidden { display: none !important; }
  .text-center { text-align: center; }

  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 14px 32px; border: none; border-radius: 50px;
    font-size: 1rem; font-weight: 600; cursor: pointer;
    transition: all .3s ease; text-decoration: none;
  }
  .btn-primary {
    background: var(--green-primary); color: var(--white);
    box-shadow: 0 4px 14px rgba(34,197,94,.35);
  }
  .btn-primary:hover {
    background: var(--green-dark);
    box-shadow: 0 6px 20px rgba(34,197,94,.45);
    transform: translateY(-2px);
  }
  .btn-outline {
    background: transparent; color: var(--green-primary);
    border: 2px solid var(--green-primary);
  }
  .btn-outline:hover { background: var(--green-primary); color: var(--white); }
  .btn-navy { background: var(--navy); color: var(--white); }
  .btn-navy:hover { background: var(--navy-light); transform: translateY(-2px); }
  .btn-sm { padding: 10px 22px; font-size: .9rem; }
  .btn-danger { background: #EF4444; color: #fff; }
  .btn-danger:hover { background: #DC2626; }

  /* ══════════ HEADER / NAV ══════════ */
  .site-header {
    position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
    background: rgba(255,255,255,.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--gray-200);
    transition: box-shadow .3s;
  }
  .site-header.scrolled { box-shadow: var(--shadow-md); }

  .nav-inner {
    display: flex; align-items: center; justify-content: space-between;
    height: 72px;
  }

  .logo-wrap {
    display: flex; align-items: center; gap: 10px;
    text-decoration: none;
  }
  .logo-wrap img { height: 42px; width: auto; }
  .logo-text {
    font-size: 1.6rem; font-weight: 800; letter-spacing: 1px;
    background: linear-gradient(135deg, var(--navy), var(--green-primary));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .nav-links { display: flex; align-items: center; gap: 28px; list-style: none; }
  .nav-links a {
    text-decoration: none; color: var(--gray-700); font-weight: 500;
    font-size: .95rem; transition: color .2s; position: relative;
  }
  .nav-links a:hover { color: var(--green-primary); }
  .nav-links a::after {
    content: ''; position: absolute; bottom: -4px; left: 0;
    width: 0; height: 2px; background: var(--green-primary);
    transition: width .3s;
  }
  .nav-links a:hover::after { width: 100%; }

  .hamburger {
    display: none; background: none; border: none; cursor: pointer;
    flex-direction: column; gap: 5px;
  }
  .hamburger span {
    display: block; width: 26px; height: 3px;
    background: var(--navy); border-radius: 3px; transition: .3s;
  }

  /* ══════════ HERO ══════════ */
  .hero {
    padding: 140px 0 80px;
    background: linear-gradient(165deg, var(--green-bg) 0%, var(--white) 60%);
    position: relative; overflow: hidden;
  }
  .hero::before {
    content: ''; position: absolute; top: -120px; right: -120px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(34,197,94,.12), transparent 70%);
    border-radius: 50%;
  }
  .hero-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 60px; align-items: center;
  }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--green-light); color: var(--green-dark);
    padding: 6px 16px; border-radius: 50px;
    font-size: .85rem; font-weight: 600; margin-bottom: 20px;
  }
  .hero h1 {
    font-size: 3rem; font-weight: 800; color: var(--navy);
    line-height: 1.15; margin-bottom: 20px;
  }
  .hero h1 span { color: var(--green-primary); }
  .hero p {
    font-size: 1.15rem; color: var(--gray-700);
    margin-bottom: 32px; max-width: 500px;
  }
  .hero-buttons { display: flex; gap: 16px; flex-wrap: wrap; }

  .hero-visual {
    display: flex; justify-content: center; align-items: center;
    position: relative;
  }
  .hero-card {
    width: 340px; height: 460px;
    background: linear-gradient(145deg, var(--navy), var(--navy-light));
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px; color: var(--white); text-align: center;
    position: relative; overflow: hidden;
  }
  .hero-card::before {
    content: ''; position: absolute; top: -50%; right: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle at 30% 30%, rgba(34,197,94,.15), transparent 50%);
  }
  .hero-card .book-icon { font-size: 5rem; margin-bottom: 24px; }
  .hero-card h3 { font-size: 1.3rem; margin-bottom: 8px; position: relative; }
  .hero-card p { font-size: .9rem; opacity: .8; position: relative; }

  .float-badge {
    position: absolute; background: var(--white);
    padding: 12px 18px; border-radius: var(--radius);
    box-shadow: var(--shadow-md); font-size: .85rem;
    font-weight: 600; color: var(--navy);
    display: flex; align-items: center; gap: 8px;
    animation: float 3s ease-in-out infinite;
  }
  .float-badge.top-right { top: 20px; right: -20px; }
  .float-badge.bottom-left { bottom: 30px; left: -30px; animation-delay: 1.5s; }

  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  /* ══════════ SEÇÕES GERAIS ══════════ */
  section { padding: 80px 0; }
  .section-label {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--green-primary); font-weight: 700;
    font-size: .85rem; text-transform: uppercase;
    letter-spacing: 1.5px; margin-bottom: 12px;
  }
  .section-title {
    font-size: 2.2rem; font-weight: 800; color: var(--navy);
    margin-bottom: 16px;
  }
  .section-sub {
    font-size: 1.05rem; color: var(--gray-500);
    max-width: 600px; margin: 0 auto 48px;
  }

  /* ══════════ BENEFÍCIOS ══════════ */
  .benefits { background: var(--white); }
  .benefits-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px;
  }
  .benefit-card {
    background: var(--gray-50); border: 1px solid var(--gray-200);
    border-radius: var(--radius); padding: 32px;
    transition: transform .3s, box-shadow .3s;
  }
  .benefit-card:hover {
    transform: translateY(-6px); box-shadow: var(--shadow-md);
    border-color: var(--green-light);
  }
  .benefit-icon {
    width: 52px; height: 52px; border-radius: 12px;
    background: var(--green-bg); color: var(--green-primary);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem; margin-bottom: 18px;
  }
  .benefit-card h3 {
    font-size: 1.15rem; color: var(--navy); margin-bottom: 10px;
  }
  .benefit-card p { font-size: .95rem; color: var(--gray-500); }

  /* ══════════ CONTEÚDO DO E-BOOK ══════════ */
  .ebook-content { background: var(--green-bg); }
  .ebook-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 48px;
    align-items: start;
  }
  .chapter-list { list-style: none; }
  .chapter-item {
    display: flex; align-items: flex-start; gap: 16px;
    padding: 18px 0; border-bottom: 1px solid var(--green-light);
  }
  .chapter-number {
    flex-shrink: 0; width: 36px; height: 36px;
    background: var(--green-primary); color: var(--white);
    border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-weight: 700; font-size: .9rem;
  }
  .chapter-item h4 { font-size: 1rem; color: var(--navy); margin-bottom: 4px; }
  .chapter-item p { font-size: .88rem; color: var(--gray-500); }

  .ebook-sidebar {
    background: var(--white); border-radius: var(--radius-lg);
    padding: 36px; box-shadow: var(--shadow-md);
    position: sticky; top: 100px;
  }
  .ebook-sidebar .price-tag {
    font-size: 2.4rem; font-weight: 800; color: var(--green-primary);
    margin-bottom: 4px;
  }
  .ebook-sidebar .price-old {
    font-size: 1rem; color: var(--gray-500);
    text-decoration: line-through; margin-bottom: 20px;
  }
  .ebook-sidebar .includes { list-style: none; margin: 20px 0; }
  .ebook-sidebar .includes li {
    padding: 8px 0; font-size: .95rem; color: var(--gray-700);
    display: flex; align-items: center; gap: 10px;
  }
  .ebook-sidebar .includes li::before { content: '✓'; color: var(--green-primary); font-weight: 700; }

  /* ══════════ DEPOIMENTOS ══════════ */
  .testimonials { background: var(--white); }
  .testimonial-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px;
  }
  .testimonial-card {
    background: var(--gray-50); border: 1px solid var(--gray-200);
    border-radius: var(--radius); padding: 28px;
  }
  .stars { color: #FBBF24; font-size: 1.1rem; margin-bottom: 14px; letter-spacing: 2px; }
  .testimonial-card blockquote {
    font-size: .95rem; color: var(--gray-700);
    font-style: italic; margin-bottom: 18px;
    line-height: 1.7;
  }
  .testimonial-author {
    display: flex; align-items: center; gap: 12px;
  }
  .author-avatar {
    width: 42px; height: 42px; border-radius: 50%;
    background: var(--green-light); color: var(--green-dark);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
  }
  .author-info strong { display: block; font-size: .9rem; color: var(--navy); }
  .author-info span { font-size: .8rem; color: var(--gray-500); }

  /* ══════════ FAQ ══════════ */
  .faq { background: var(--green-bg); }
  .faq-list { max-width: 720px; margin: 0 auto; }
  .faq-item {
    background: var(--white); border-radius: var(--radius);
    margin-bottom: 12px; overflow: hidden;
    border: 1px solid var(--gray-200);
  }
  .faq-q {
    width: 100%; padding: 20px 24px; border: none;
    background: none; text-align: left; cursor: pointer;
    font-size: 1rem; font-weight: 600; color: var(--navy);
    display: flex; justify-content: space-between; align-items: center;
    font-family: var(--font);
  }
  .faq-q .arrow { transition: transform .3s; font-size: .8rem; color: var(--green-primary); }
  .faq-q.active .arrow { transform: rotate(180deg); }
  .faq-a {
    max-height: 0; overflow: hidden; transition: max-height .4s ease, padding .3s;
    padding: 0 24px; color: var(--gray-700); font-size: .95rem; line-height: 1.7;
  }
  .faq-a.open { max-height: 300px; padding: 0 24px 20px; }

  /* ══════════ CTA FINAL ══════════ */
  .final-cta {
    background: linear-gradient(135deg, var(--navy), var(--navy-light));
    color: var(--white); text-align: center; padding: 80px 0;
  }
  .final-cta h2 { font-size: 2.2rem; margin-bottom: 16px; }
  .final-cta p { font-size: 1.1rem; opacity: .85; margin-bottom: 32px; max-width: 550px; margin-left: auto; margin-right: auto; }

  /* ══════════ FOOTER ══════════ */
  .site-footer {
    background: var(--gray-900); color: var(--gray-300); padding: 48px 0 24px;
  }
  .footer-grid {
    display: grid; grid-template-columns: 2fr 1fr 1fr 1fr;
    gap: 40px; margin-bottom: 40px;
  }
  .footer-brand p { font-size: .9rem; margin-top: 12px; line-height: 1.7; opacity: .7; }
  .footer-col h4 {
    color: var(--white); font-size: .95rem; margin-bottom: 16px;
    text-transform: uppercase; letter-spacing: 1px;
  }
  .footer-col ul { list-style: none; }
  .footer-col li { margin-bottom: 10px; }
  .footer-col a { color: var(--gray-300); text-decoration: none; font-size: .9rem; transition: color .2s; }
  .footer-col a:hover { color: var(--green-primary); }
  .footer-bottom {
    border-top: 1px solid rgba(255,255,255,.1);
    padding-top: 20px; text-align: center;
    font-size: .85rem; opacity: .5;
  }

  /* ══════════ PAINEL (CLIENTE & ADMIN) ══════════ */
  .panel-page {
    padding-top: 90px; min-height: 100vh;
    background: var(--gray-50);
  }

  .login-container {
    max-width: 420px; margin: 60px auto;
    background: var(--white); border-radius: var(--radius-lg);
    padding: 40px; box-shadow: var(--shadow-md);
    border: 1px solid var(--gray-200);
  }
  .login-container h2 {
    font-size: 1.5rem; color: var(--navy);
    margin-bottom: 8px; text-align: center;
  }
  .login-container .login-sub {
    text-align: center; color: var(--gray-500);
    font-size: .9rem; margin-bottom: 28px;
  }

  .form-group { margin-bottom: 18px; }
  .form-group label {
    display: block; font-size: .88rem; font-weight: 600;
    color: var(--gray-700); margin-bottom: 6px;
  }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 12px 16px; border: 1.5px solid var(--gray-200);
    border-radius: 10px; font-size: .95rem; font-family: var(--font);
    transition: border-color .2s; background: var(--gray-50);
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline: none; border-color: var(--green-primary);
    background: var(--white);
  }

  .dashboard {
    display: grid; grid-template-columns: 260px 1fr;
    min-height: calc(100vh - 72px);
  }
  .sidebar {
    background: var(--white); border-right: 1px solid var(--gray-200);
    padding: 32px 0;
  }
  .sidebar-menu { list-style: none; }
  .sidebar-menu li a {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 28px; color: var(--gray-700);
    text-decoration: none; font-size: .95rem; font-weight: 500;
    transition: all .2s; border-left: 3px solid transparent;
  }
  .sidebar-menu li a:hover, .sidebar-menu li a.active {
    background: var(--green-bg); color: var(--green-primary);
    border-left-color: var(--green-primary);
  }
  .sidebar-menu li a .menu-icon { font-size: 1.1rem; width: 24px; text-align: center; }

  .dash-content {
    padding: 32px 40px;
  }
  .dash-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 32px;
  }
  .dash-header h1 { font-size: 1.6rem; color: var(--navy); }
  .user-badge {
    display: flex; align-items: center; gap: 10px;
    background: var(--white); padding: 8px 16px;
    border-radius: 50px; border: 1px solid var(--gray-200);
  }
  .user-badge .avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--green-primary); color: var(--white);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: .85rem;
  }

  .stat-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap: 20px; margin-bottom: 32px; }
  .stat-card {
    background: var(--white); border-radius: var(--radius);
    padding: 24px; border: 1px solid var(--gray-200);
  }
  .stat-card .stat-icon {
    width: 44px; height: 44px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; margin-bottom: 14px;
  }
  .stat-card .stat-icon.green { background: var(--green-bg); color: var(--green-primary); }
  .stat-card .stat-icon.blue { background: #EFF6FF; color: #3B82F6; }
  .stat-card .stat-icon.purple { background: #F5F3FF; color: #8B5CF6; }
  .stat-card .stat-icon.orange { background: #FFF7ED; color: #F97316; }
  .stat-card h3 { font-size: 1.8rem; color: var(--navy); margin-bottom: 4px; }
  .stat-card p { font-size: .85rem; color: var(--gray-500); }

  .panel-card {
    background: var(--white); border-radius: var(--radius);
    border: 1px solid var(--gray-200); padding: 28px;
    margin-bottom: 24px;
  }
  .panel-card h2 {
    font-size: 1.2rem; color: var(--navy); margin-bottom: 20px;
    padding-bottom: 14px; border-bottom: 1px solid var(--gray-100);
  }

  .data-table { width:
